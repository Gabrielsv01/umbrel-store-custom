version: "3.7"
services:
  bluetooth-api-manager:
    # Pre-built image pulled from Docker Hub (Umbrel does not build on-device).
    # To rebuild locally: `docker build -t gabrielsv01/bluetooth-api-manager:1.3.3 ./code`
    image: gabrielsv01/bluetooth-api-manager:1.4.0
    container_name: bluetooth-api-manager
    environment:
      - PORT=5157
      # Timezone used by the play Scheduler. Set to your zone, e.g.
      # America/Sao_Paulo, so scheduled times match your wall clock.
      - TZ=${TZ:-UTC}
      # Piper TTS worker (the piper service below, on the host network).
      - PIPER_URL=http://127.0.0.1:5158
    # Host networking + privileged give the container direct access to the HCI
    # Bluetooth adapter. The app runs its OWN Bluetooth stack (bluetoothd,
    # bluez-alsa, obexd) so it is fully self-contained — no host audio server or
    # host D-Bus needed.
    #
    # IMPORTANT: because the container owns the adapter, disable the host's own
    # bluetooth service once on the Pi to avoid conflicts:
    #     sudo systemctl disable --now bluetooth
    network_mode: host
    privileged: true
    volumes:
      # Persist uploaded audio/files, received files and app state.
      - ${APP_DATA_DIR:-./data}/data:/data
      # Persist BlueZ pairings + cached device names so they survive restarts
      # and app updates (otherwise every restart forgets paired speakers).
      - ${APP_DATA_DIR:-./data}/bluetooth:/var/lib/bluetooth
    restart: unless-stopped

  # Piper text-to-speech worker. Isolated so the heavy ONNX runtime stays out of
  # the main image. Downloads the pt-BR Razo voice into the voices volume on
  # first run. Host network so the main app reaches it at 127.0.0.1:5158.
  piper:
    # To rebuild locally: `docker build -t gabrielsv01/piper-tts-box:1.0.0 ./code/piper`
    image: gabrielsv01/piper-tts-box:1.0.0
    container_name: bluetooth-piper-tts
    environment:
      - PORT=5158
      - VOICES_DIR=/voices
    network_mode: host
    volumes:
      # Voice models (.onnx + .onnx.json). Persisted so they download only once.
      - ${APP_DATA_DIR:-./data}/voices:/voices
    restart: unless-stopped
