<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Bluetooth API Manager">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2A7BFF"/>
      <stop offset="1" stop-color="#0A2472"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.65">
      <stop offset="0" stop-color="#8FC0FF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#8FC0FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>

  <!-- App tile -->
  <rect x="0" y="0" width="512" height="512" rx="114" fill="url(#bg)"/>
  <rect x="0" y="0" width="512" height="512" rx="114" fill="url(#glow)"/>

  <!-- Connectivity arcs (subtle) -->
  <g fill="none" stroke="#FFFFFF" stroke-opacity="0.16" stroke-width="16" stroke-linecap="round">
    <path d="M366 176 a120 120 0 0 1 0 160"/>
    <path d="M404 138 a176 176 0 0 1 0 236"/>
    <path d="M146 176 a120 120 0 0 0 0 160"/>
    <path d="M108 138 a176 176 0 0 0 0 236"/>
  </g>

  <!-- Bluetooth rune -->
  <g filter="url(#soft)" opacity="0.35">
    <path d="M190 193 L322 319 L256 382 L256 130 L322 193 L190 319"
          fill="none" stroke="#0A2472" stroke-width="40"
          stroke-linejoin="round" stroke-linecap="round"/>
  </g>
  <path d="M190 193 L322 319 L256 382 L256 130 L322 193 L190 319"
        fill="none" stroke="#FFFFFF" stroke-width="36"
        stroke-linejoin="round" stroke-linecap="round"/>
</svg>
