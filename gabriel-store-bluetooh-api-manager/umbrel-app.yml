manifestVersion: 1
id: gabriel-store-bluetooh-api-manager
name: Bluetooth API Manager
tagline: Manage Bluetooth devices, stream data and control them over an API
icon: https://raw.githubusercontent.com/Gabrielsv01/umbrel-store-custom/main/gabriel-store-bluetooh-api-manager/icon.svg
category: Utilities
version: "1.5.9"
port: 5157
description: >-
  Bluetooth API Manager gives you a single place to see and control the
  Bluetooth adapter on your Umbrel host.


  Features:

  - Live list of nearby / connected devices with name, address and signal
    strength (RSSI).

  - Inspect GATT services and characteristics, and watch the data a device is
    transmitting in real time.

  - A clean REST API (with Swagger docs at /docs) so other systems can connect
    to a device and read/write its characteristics.

  - Stream any audio file — local upload or a direct URL — to a Bluetooth
    speaker/headset (A2DP, best-effort, requires an audio server on the host).

  - Send files to a device over OBEX Object Push.

  - A web interface to watch everything happening on the manager in real time.


  Requires a host with a working Bluetooth adapter and the BlueZ stack
  (bluetoothd). Runs with host networking and access to the system D-Bus.
