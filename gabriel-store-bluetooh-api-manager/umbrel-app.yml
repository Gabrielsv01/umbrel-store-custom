releaseNotes: >-
  1.5.9: fix the first track always glitching on Echo/Alexa — the speaker's
  first PCM open after a connect is glitchy while a second open is clean, so the
  app now sacrifices a short throwaway silent open first and streams the real
  track on the clean second open; queued tracks skip it (AUDIO_RECONNECT_DELAY
  sets the warm-up length, 1-2s is plenty). 1.5.8: the silent warm-up now plays before the FIRST track too (not
  only after an error/reconnect), so the very first audio to a cold speaker no
  longer glitches on its first seconds; back-to-back queued tracks skip it since
  the link is already warm (AUDIO_RECONNECT_DELAY). 1.5.7: recover from a broken pairing — a new "Forget" button (and
  POST /classic/{addr}/forget) clears a device's stale link key, and Pair +
  Connect now auto-clears it when pairing fails with an authentication error
  (0x05) so a single tap re-pairs cleanly (put the speaker in pairing mode
  first). Also smoother playback start: if A2DP isn't up yet the app now waits
  briefly and retries without reconnecting, so the speaker's disconnect/reconnect
  chime and rough first seconds only happen as a last resort. 1.5.6: fix "br-connection-profile-unavailable" when playing to a paired
  speaker — the app now pauses BLE discovery for the duration of a play, since a
  running inquiry blocks the BR/EDR A2DP connect and glitches the stream;
  discovery resumes automatically afterwards. 1.5.5: also retry the reconnect when playback fails with "Unable to install hw
  params" / "set_params" (not just "PCM not found") — same A2DP-not-ready cause,
  so plays to an Echo/Alexa whose audio transport hasn't negotiated yet now
  recover instead of erroring out. 1.5.4: fix garbled / cut-off audio on Echo/Alexa after a reconnect — instead of
  waiting in silence (which let the A2DP link sleep and glitch on wake), the app
  now streams a silent lead-in that keeps the link warm while the "connected"
  prompt plays, so the track starts cleanly (AUDIO_RECONNECT_DELAY). 1.5.3: after a forced reconnect, wait for the speaker's "connected" prompt to
  finish before streaming, so the audio no longer overlaps it
  (AUDIO_RECONNECT_DELAY). 1.5.2: the "Clean now" button now purges all cached audio immediately
  (automatic cleanup still respects the retention window). 1.5.1: if playback fails because the A2DP link isn't up ("PCM not found"), the
  app now forces a reconnect and retries once, so plays to a just-reconnected
  speaker work reliably. 1.5.0: automatic cleanup of old generated/uploaded audio (kept if tied to a
  schedule; retention via AUDIO_RETENTION_DAYS) with a Storage panel + Clean-now
  button; fine voice controls in the Voice tab (expressiveness, cadence,
  sentence pause) per request. 1.4.2: tune the Piper voice via env vars (PIPER_LENGTH_SCALE speed,
  PIPER_NOISE_SCALE expressiveness, PIPER_NOISE_W cadence, PIPER_SENTENCE_SILENCE
  pause) as container-wide defaults, overridable per request. 1.4.1: adjustable
  speech speed (Normal / Slower / Fast); the Piper worker now
  synthesizes in a short-lived subprocess so it uses almost no memory when idle
  (~33 MiB) — the model's ~120 MiB is freed after each generation. 1.4.0:
  text-to-speech! New Voice tab + API — type text, Piper (pt-BR Razo
  voice) generates speech and plays it on a speaker now or on a schedule. Runs
  as a separate 'piper' container; generation is queued. 1.3.3: skip the
  reconnect when a speaker is already connected, so it doesn't
  re-announce "connected" before playing (scheduled/queued plays start cleanly).
  1.3.2: schedules can have an optional title (shown instead of the file/URL).
  1.3.1: rename devices (friendly per-device name) and rename the Pi's own
  Bluetooth adapter, from the Devices tab or the API. 1.3.0: new Schedule tab + API — play a track on a speaker at a given time
  (once / daily / weekly), cron-style, reusing the play queue; schedules persist
  across restarts (set TZ for correct local times). 1.2.5: fix the ALSA plug
  device syntax so 48kHz speakers (Echo/Alexa) actually
  play (1.2.4 broke the PCM name parsing). 1.2.4: route audio through ALSA's plug
  converter for speakers negotiating other sample rates. 1.2.3: new GET /api/devices/{addr}/values endpoint — snapshot of the latest
  read/notified value per GATT characteristic, so external systems can poll
  sensor data without a WebSocket; clearer Live Data guidance. 1.2.2: persist
  Bluetooth pairings across restarts/updates (paired speakers are no longer
  forgotten); BLE connect now retries/re-discovers instead of failing with
  "not found" after a disconnect. 1.2.1: unified device view (LE + Classic
  of the same device in one card),
  an audio play queue (add tracks without waiting), reliable one-tap
  Pair + Connect for speakers, and live connection status. 1.2.0: pair
  Bluetooth Classic speakers/headsets from the Audio tab (scan, pair, connect)
  and fixed the audio pipeline. 1.1.0: self-contained audio via
  an in-container bluez-alsa stack (no host audio server); the app runs its own
  Bluetooth stack, so disable the host's bluetooth service
  (systemctl disable --now bluetooth). 1.0.0: BLE discovery, live GATT data,
  REST + WebSocket API and a web interface.
