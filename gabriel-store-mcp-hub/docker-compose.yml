services:
  mcp-hub:
    build:
      context: ./code
      dockerfile: Dockerfile
    container_name: mcp-hub
    environment:
      - NODE_ENV=production
      - DATA_DIR=/data
      - STATIC_DIR=/app/public
      - TZ=${TZ:-UTC}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${APP_DATA_DIR:-./.appdata}/data:/data
    ports:
      - "${APP_PORT:-5146}:3001"
    restart: unless-stopped
