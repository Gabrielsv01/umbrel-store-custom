<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Music Tag logo">
  <defs>
    <linearGradient id="mt-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7E8BFF"/>
      <stop offset="0.55" stop-color="#5A6FE0"/>
      <stop offset="1" stop-color="#4B5AD0"/>
    </linearGradient>
    <linearGradient id="mt-pencil" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFC24D"/>
      <stop offset="1" stop-color="#F5A623"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="46" fill="url(#mt-bg)"/>
  <rect width="200" height="200" rx="46" fill="#ffffff" opacity="0.06"/>

  <!-- Music note (white) -->
  <g fill="#ffffff">
    <rect x="84" y="52" width="8" height="92" rx="4"/>
    <path d="M92 52 C118 58 122 84 106 104 C118 86 112 70 92 70 Z"/>
    <ellipse cx="68" cy="144" rx="20" ry="15" transform="rotate(-20 68 144)"/>
  </g>

  <!-- Pencil crossing diagonally, tip toward the note (symbolises editing) -->
  <g transform="translate(144,100) rotate(40)">
    <!-- eraser -->
    <rect x="-13" y="-80" width="26" height="16" rx="7" fill="#F2748C"/>
    <!-- ferrule -->
    <rect x="-13" y="-66" width="26" height="8" fill="#D6DAE3"/>
    <!-- body -->
    <rect x="-13" y="-58" width="26" height="92" fill="url(#mt-pencil)"/>
    <rect x="-2" y="-58" width="4" height="92" fill="#E39518" opacity="0.5"/>
    <!-- wood tip -->
    <polygon points="-13,34 13,34 0,60" fill="#F3DCB0"/>
    <!-- graphite point -->
    <polygon points="-5,49 5,49 0,60" fill="#3A3F4B"/>
  </g>
</svg>
