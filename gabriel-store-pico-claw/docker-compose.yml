services:
  picoclaw:
    image: docker.io/sipeed/picoclaw:v0.2.8
    container_name: picoclaw
    restart: unless-stopped
    ports:
      - 5144:8080
    volumes:
      - ${APP_DATA_DIR}/workspace:/app/data/workspace
      # - ./workspace:/app/data/workspace
      # - ./config/config.json:/root/.picoclaw/config.json:ro
      - ${APP_DATA_DIR}/config:/root/.picoclaw
    environment:
      - TZ=America/Sao_Paulo
      - NODE_ENV=production
      - PICOCLAW_GATEWAY_HOST=0.0.0.0
      - PICOCLAW_GATEWAY_PORT=8080
  
  picoclaw-launcher:
      image: docker.io/sipeed/picoclaw:v0.2.8-launcher
      container_name: picoclaw-launcher
      restart: unless-stopped
      environment:
        - PICOCLAW_GATEWAY_HOST=0.0.0.0
      ports:
        - "5145:18800"
        - "5146:18790"
      volumes:
        - ${APP_DATA_DIR}/workspace:/app/data/workspace
        # - ./workspace:/app/data/workspace
        # - ./config/config.json:/root/.picoclaw/config.json:ro
        - ${APP_DATA_DIR}/config:/root/.picoclaw