manifestVersion: 1
id: gabriel-store-puddletag
name: puddletag
tagline: A powerful MP3 tagging solution
icon: https://raw.githubusercontent.com/Gabrielsv01/umbrel-store-custom/main/gabriel-store-puddletag/icon.svg
category: media
version: "0.0.1"
port: 5147
description: >-
  Puddletag is a versatile and user-friendly application designed for managing and editing metadata of your audio files. It supports a wide range of audio formats and provides an intuitive interface for organizing your music library efficiently. With Puddletag, you can easily update song information, album art, and other metadata, ensuring your music collection is well-organized and accurately labeled.

developer: Puddletag
website: https://docs.puddletag.net/
submitter: Gabriel Vieira
submission: https://github.com/getumbrel/umbrel-apps/pull/2498
repo: https://docs.puddletag.net/
support: https://docs.puddletag.net/
releaseNotes: >-
  First version of the Puddletag app for Umbrel.
dependencies: []
permissions:
  - STORAGE_DOWNLOADS
