<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:; base-uri 'none'; form-action 'self'; frame-ancestors 'none'">
  <meta name="referrer" content="no-referrer">
  <meta name="color-scheme" content="dark light">
  <title>Webhook Gateway | Acesso Seguro</title>
  <style>
    :root {
      --bg: #06161f;
      --panel: rgba(8, 29, 38, 0.86);
      --line: rgba(113, 221, 255, 0.35);
      --text: #e7fbff;
      --muted: #9ac4d0;
      --accent: #2bc7ff;
      --accent-2: #10b6de;
      --danger: #ff8f8f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 12% 18%, rgba(43, 199, 255, 0.18), transparent 38%),
        radial-gradient(circle at 88% 85%, rgba(16, 182, 222, 0.2), transparent 44%),
        linear-gradient(140deg, #041017 0%, var(--bg) 100%);
      color: var(--text);
      font-family: "Space Grotesk", "Avenir Next", "Trebuchet MS", sans-serif;
    }

    .shell {
      width: 100%;
      max-width: 430px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.42);
      overflow: hidden;
    }

    .stripe {
      height: 4px;
      background: linear-gradient(90deg, var(--accent), #55e4c5, var(--accent-2));
    }

    .login-box {
      padding: 24px;
      display: grid;
      gap: 14px;
    }

    .badge {
      justify-self: start;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(113, 221, 255, 0.35);
      background: rgba(43, 199, 255, 0.12);
      color: #aee7f7;
      font-size: 0.76rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: 1.5rem;
      text-align: center;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
      font-size: 0.95rem;
    }

    label {
      font-weight: 600;
      font-size: 0.9rem;
      color: #cbeef7;
    }

    .field {
      display: grid;
      gap: 8px;
      margin-top: 4px;
    }

    input[type="password"] {
      width: 100%;
      border-radius: 12px;
      border: 1px solid rgba(113, 221, 255, 0.3);
      background: rgba(1, 17, 24, 0.75);
      color: var(--text);
      padding: 12px 14px;
      font-size: 0.98rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input[type="password"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(43, 199, 255, 0.2);
    }

    .hint {
      font-size: 0.8rem;
      color: var(--muted);
    }

    button {
      margin-top: 6px;
      border: none;
      border-radius: 12px;
      padding: 12px 14px;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #02222d;
      font-weight: 700;
      font-size: 0.96rem;
      transition: transform 0.15s ease, filter 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.7;
      transform: none;
    }

    .error-message {
      display: none;
      border: 1px solid rgba(255, 143, 143, 0.5);
      background: rgba(255, 143, 143, 0.12);
      color: #ffd4d4;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 0.9rem;
      line-height: 1.35;
    }

    .footer {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--danger);
      box-shadow: 0 0 0 4px rgba(255, 143, 143, 0.16);
    }
  </style>
</head>
<body>
  <main class="shell" role="main" aria-labelledby="login-title">
    <div class="stripe" aria-hidden="true"></div>

    <form class="login-box" method="POST" action="/" autocomplete="on" novalidate>
      <h1 id="login-title">Webhook Gateway</h1>

      <div class="field">
        <label for="password">Senha</label>
        <input
          id="password"
          type="password"
          name="password"
          placeholder="Sua senha"
          autocomplete="current-password"
          autocapitalize="off"
          autocorrect="off"
          spellcheck="false"
          minlength="1"
          maxlength="256"
          required
        />
      </div>

      <button id="submit-btn" type="submit">Entrar</button>
      <div id="login-error" class="error-message" role="alert" aria-live="polite"></div>

    </form>
  </main>

  <script>
    const loginForm = document.querySelector('form.login-box');
    const passwordInput = document.getElementById('password');
    const submitButton = document.getElementById('submit-btn');
    const errorBox = document.getElementById('login-error');

    function setLoading(isLoading) {
      if (!submitButton) return;
      if (isLoading) {
        submitButton.setAttribute('disabled', 'true');
        submitButton.textContent = 'Validando...';
        return;
      }

      submitButton.removeAttribute('disabled');
      submitButton.textContent = 'Entrar';
    }

    function showError(message) {
      if (!errorBox) return;
      errorBox.textContent = message;
      errorBox.style.display = 'block';
    }

    function clearError() {
      if (!errorBox) return;
      errorBox.textContent = '';
      errorBox.style.display = 'none';
    }

    if (loginForm && submitButton && passwordInput) {
      loginForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        clearError();

        const password = passwordInput.value || '';
        if (!password.trim()) {
          showError('Senha obrigatória');
          return;
        }

        setLoading(true);

        try {
          const body = new URLSearchParams();
          body.set('password', password);

          const response = await fetch('/', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: body.toString(),
            redirect: 'follow',
          });

          if (response.redirected || response.ok && response.url.includes('/dashboard')) {
            window.location.href = '/dashboard';
            return;
          }

          const errorText = (await response.text()).trim();
          showError(errorText || 'Não foi possível autenticar agora.');
        } catch (_err) {
          showError('Falha de conexão ao autenticar. Tente novamente.');
        } finally {
          setLoading(false);
        }
      });

      passwordInput.addEventListener('input', () => {
        if (errorBox && errorBox.style.display === 'block') {
          clearError();
        }
      });
    }
  </script>
</body>
</html>
