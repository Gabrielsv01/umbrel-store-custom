# Filtros (Proposta A): `filter` é um objeto cujas chaves são os tipos de filtro.
# Vários tipos no mesmo bloco => todos precisam passar (AND). Omitir `filter` => sem filtragem.
# Tipos disponíveis: telegram, alexa, queryParams. Exemplo de query params:
#   meuservico:
#     destination: ${MEU_WEBHOOK_URL}
#     filter:
#       queryParams:
#         u:
#           - 1234

telegram:
  destination: ${TELEGRAM_WEBHOOK_URL}
  methods:
    - POST
  filter:
    telegram:
      chatIds: ${TELEGRAM_AUTHORIZED_CHAT_IDS}
      usernames: ${TELEGRAM_AUTHORIZED_USERNAMES}
  rateLimit:
    windowMinutes: 15
    max: 100

webhook-test:
  destination: ${N8N_WEBHOOK_URL}
  methods:
    - POST
  filter:
    telegram:
      chatIds: ${TELEGRAM_AUTHORIZED_CHAT_IDS}
      usernames: ${TELEGRAM_AUTHORIZED_USERNAMES}

webhook:
  destination: ${N8N_WEBHOOK_URL}
  methods:
    - POST
  filter:
    telegram:
      chatIds: ${TELEGRAM_AUTHORIZED_CHAT_IDS}
      usernames: ${TELEGRAM_AUTHORIZED_USERNAMES}

alexa:
  destination: ${ALEXA_WEBHOOK_URL}
  methods:
    - POST
  filter:
    alexa:
      applicationId: ${ALEXA_APPLICATION_ID}

substream:
  destination: ${SUBSTREAM_WEBHOOK_URL}
  methods:
    - POST
    - GET
  upstream:
    timeoutMsByMethod:
      GET: 0
      POST: 5000
    forwardRequest:
      HEADERS:
        - range
        - accept
        - user-agent
        - if-none-match
        - if-modified-since
  response:
    default:
      forward: []
      defaultStatus: 200
      defaultBody: OK
    methods:
      GET:
        forward:
          STATUS: "*"
          BODY: "*"
          HEADERS: "*"
  subdomain:
    - path: rest/*
      filter:
        queryParams:
          u:
            - 1234
  rateLimit:
    disabled: true
